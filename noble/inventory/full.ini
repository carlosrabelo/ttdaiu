# Testing environment inventory
# For Vagrant VMs and test systems

[vagrant]
default ansible_host=127.0.0.1 ansible_port=2222 ansible_user=vagrant ansible_ssh_private_key_file=.vagrant/machines/default/virtualbox/private_key

[local]
localhost ansible_connection=local

[testing:children]
vagrant
local

[testing:vars]
# Testing-specific settings
backup_enabled=false
debug_mode=true
apt_upgrade_type=dist
log_level=debug