[defaults]
# Disable host key checking for local connections
host_key_checking = False

# Python interpreter detection
interpreter_python = auto_silent

# Disable retry files (creates clutter)
retry_files_enabled = False

# Better output formatting
stdout_callback = yaml
bin_ansible_callbacks = True

# Connection settings
timeout = 30
inventory = inventory/production.ini

# Fact gathering settings
gathering = smart
fact_caching = memory
fact_caching_timeout = 86400

# Performance optimizations
forks = 10
nocows = True

# Logging configuration
log_path = /tmp/ansible-jammy.log

# Display settings
display_skipped_hosts = False
display_ok_hosts = True
any_errors_fatal = False

# Privilege escalation
become_ask_pass = True

[ssh_connection]
# Performance improvements
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=30m -o ConnectionAttempts=10 -o UserKnownHostsFile=/dev/null

[inventory]
# Enable host pattern warnings
enable_plugins = host_list, script, auto, yaml, ini, toml

[colors]
# Colorized output
highlight = white
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecate = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
diff_add = green
diff_remove = red
diff_lines = cyan